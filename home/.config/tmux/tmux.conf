# Prefix
set -g prefix C-Space
set -g prefix2 C-a
unbind C-b
bind C-Space send-prefix
bind C-a send-prefix -2

# Terminal integration
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -s set-clipboard on
set -g focus-events on

# General behavior
# set -g history-limit 50000
set -sg escape-time 0
set -g mouse on
setw -g mode-keys vi

# Window and pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Split in current directory
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Minimal status line
set -g status-style fg=#908caa,bg=#1f1d2e
set -g message-style fg=#e0def4,bg=#26233a
set -g pane-border-style fg=#26233a
set -g pane-active-border-style fg=#9ccfd8

set -g status-left "#[fg=#f6c177] #S "
set -g status-right "#[fg=#908caa]%Y-%m-%d %H:%M "
