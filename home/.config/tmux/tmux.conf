# Prefix
set -g prefix C-Space
set -g prefix2 C-a
unbind C-b
bind C-Space send-prefix
bind C-a send-prefix -2

# Terminal integration
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -s set-clipboard on
set -g focus-events on

# General behavior
set -g history-limit 50000
set -sg escape-time 0
set -g mouse on
set -g status-interval 5
set -g status-justify absolute-centre
setw -g mode-keys vi

# Window and pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind x kill-pane

# Split in current directory
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Manual Rose Pine status line
set -g @cpu_percentage_format '%.0f%%'
set -g @ram_percentage_format '%.0f%%'

set -g status-position bottom
set -g status-style 'bg=default'
set -g status-left-length 20
set -g status-right-length 120

set -g message-style 'fg=#908caa,bg=default'
set -g message-command-style 'fg=#191724,bg=#f6c177'

set -g pane-border-style 'fg=#26233a'
set -g pane-active-border-style 'fg=#524f67'
setw -g clock-mode-colour '#eb6f92'
setw -g mode-style 'fg=#e0def4,bg=#1f1d2e'

set -g status-left '#[fg=#{?client_prefix,#eb6f92,#9ccfd8}] #[fg=#e0def4]#S '
set -g status-right '#[fg=#ebbcba]#(~/.config/tmux/scripts/git-branch "#{pane_current_path}")#[fg=#9ccfd8] #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#c4a7e7]󰍛 #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#f6c177]#(~/.config/tmux/scripts/battery-status) #[fg=#908caa]󰃰 %H:%M'

set -g window-status-separator ''
set -g window-status-style 'fg=#6e6a86,bg=default'
set -g window-status-current-style 'bg=#9ccfd8,fg=#191724,bold'
set -g window-status-activity-style 'fg=#f6c177,bg=default'
set -g window-status-bell-style 'fg=#191724,bg=#eb6f92,bold'
set -g window-status-format '#[fg=#908caa] #I #[fg=#6e6a86]#W '
set -g window-status-current-format '#[bg=#9ccfd8,fg=#191724,bold] #I #W #[default] '

# TPM bootstrap
run '~/.tmux/plugins/tpm/tpm'
