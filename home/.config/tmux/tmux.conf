# Prefix
set -g prefix C-Space
set -g prefix2 C-a
unbind C-b
bind C-Space send-prefix
bind C-a send-prefix -2

# Rose Pine palette
set -g @rose_base '#191724'
set -g @rose_surface '#1f1d2e'
set -g @rose_overlay '#26233a'
set -g @rose_muted '#6e6a86'
set -g @rose_subtle '#908caa'
set -g @rose_text '#e0def4'
set -g @rose_love '#eb6f92'
set -g @rose_gold '#f6c177'
set -g @rose_foam '#9ccfd8'
set -g @rose_iris '#c4a7e7'
set -g @rose_pine '#524f67'

set -g @status_left_fmt '#[fg=#{?client_prefix,#{@rose_love},#{@rose_foam}}] #[fg=#{@rose_text}]#S '
set -g @status_right_fmt '#[fg=#{@rose_foam}] #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) #[fg=#{@rose_iris}]󰍛 #(~/.tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#{@rose_gold}]#(~/.config/tmux/scripts/battery-status) #[fg=#{@rose_subtle}] %H:%M'
set -g @window_status_fmt ' #I#{?#{!=:#{window_name},Window},: #W,} '

# Terminal integration
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -s set-clipboard on
set -g focus-events on

# General behavior
set -g history-limit 50000
set -sg escape-time 0
set -g mouse on
set -g status-interval 5
set -g status-justify absolute-centre
setw -g mode-keys vi

# Window and pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind x kill-pane

# Split in current directory
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Equalize panes
bind = select-layout main-vertical 

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Manual Rose Pine status line
set -g @cpu_percentage_format '%.0f%%'
set -g @ram_percentage_format '%.0f%%'

set -g status-position bottom
set -g status-style 'bg=default'
set -g status-left-length 20
set -g status-right-length 120

set -gF message-style 'fg=#{@rose_subtle},bg=default'
set -gF message-command-style 'fg=#{@rose_base},bg=#{@rose_gold}'

set -gF pane-border-style 'fg=#{@rose_overlay}'
set -gF pane-active-border-style 'fg=#{@rose_pine}'
setw -gF clock-mode-colour '#{@rose_love}'
setw -gF mode-style 'fg=#{@rose_base},bg=#{@rose_iris}'

set -gF status-left '#{@status_left_fmt}'
set -gF status-right '#{@status_right_fmt}'

set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -gF window-status-format '#{@window_status_fmt}'
set -gF window-status-style "bg=default,fg=#{@rose_muted}"
set -gF window-status-last-style "bg=default,fg=#{@rose_subtle}"

set -gF window-status-activity-style "bg=#{@rose_gold},fg=#{@rose_base},bold"
set -gF window-status-bell-style "bg=#{@rose_love},fg=#{@rose_base},bold"
set -gF window-status-separator "#[bg=default,fg=#{@rose_muted}]│"

set -gF window-status-current-format '#{@window_status_fmt}'
set -gF window-status-current-style "bg=#{@rose_gold},fg=#{@rose_base},bold"

# TPM bootstrap
run '~/.tmux/plugins/tpm/tpm'
