[mgr]
cwd = { fg = "#9ccfd8", bold = true }

# Find
find_keyword = { fg = "#f6c177", italic = true }
find_position = { fg = "#eb6f92", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "#9ccfd8", bg = "#9ccfd8" }
marker_copied = { fg = "#f6c177", bg = "#f6c177" }
marker_cut = { fg = "#B4637A", bg = "#B4637A" }

# Border
border_symbol = "│"
border_style = { fg = "#524f67" }

# Highlighting
syntect_theme = "~/.config/yazi/rose-pine.tmTheme"


[tabs]
active = { fg = "#e0def4", bg = "#191724" }
inactive = { fg = "#e0def4", bg = "#2A273F" }


# Indicator of hovered file
[indicator]
parent  = { fg = "#908caa", bg = "#26233A" }
current = { fg = "#191724", bg = "#9ccfd8", bold = true }
preview = { fg = "#f6c177", underline = true }
padding = { open = "▐", close = "▌" }


[mode]
normal_main = { fg = "#191724", bg = "#9ccfd8", bold = true }
normal_alt  = { fg = "#9ccfd8", bg = "#1f1d2e" }

# Select mode
select_main = { fg = "#191724", bg = "#ebbcba", bold = true }
select_alt  = { fg = "#ebbcba", bg = "#1f1d2e" }

# Unset mode
unset_main = { fg = "#191724", bg = "#eb6f92", bold = true }
unset_alt  = { fg = "#eb6f92", bg = "#1f1d2e" }


[status]
overall   = { bg = "#191724" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Permissions
perm_sep   = { fg = "#6e6a86" }
perm_type  = { fg = "#9ccfd8" }
perm_read  = { fg = "#f6c177" }
perm_write = { fg = "#eb6f92" }
perm_exec  = { fg = "#31748f" }

# Progress
progress_label = { fg = "#e0def4", bold = true }
progress_normal = { fg = "#e0def4", bg = "#1f1d2e" }
progress_error = { fg = "#eb6f92", bg = "#1f1d2e" }


[input]
border = { fg = "#524f67" }
title = {}
value = {}
selected = { reversed = true }


[pick]
border = { fg = "#524f67" }
active = { fg = "#eb6f92" }
inactive = {}


[tasks]
border = { fg = "#524f67" }
title = {}
hovered = { underline = true }


[which]
mask = { bg = "#313244" }
cand = { fg = "#9ccfd8" }
rest = { fg = "#9399b2" }
desc = { fg = "#eb6f92" }
separator = "  "
separator_style = { fg = "#585b70" }


[help]
on = { fg = "#eb6f92" }
run = { fg = "#9ccfd8" }
desc = { fg = "#9399b2" }
hovered = { bg = "#585b70", bold = true }
footer = { fg = "#2A273F", bg = "#e0def4" }


# File-specific styles
[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#9ccfd8" },

    # Videos
    { mime = "video/*", fg = "#f6c177" },
    { mime = "audio/*", fg = "#f6c177" },

    # Archives
    { mime = "application/zip", fg = "#eb6f92" },
    { mime = "application/gzip", fg = "#eb6f92" },
    { mime = "application/x-tar", fg = "#eb6f92" },
    { mime = "application/x-bzip", fg = "#eb6f92" },
    { mime = "application/x-bzip2", fg = "#eb6f92" },
    { mime = "application/x-7z-compressed", fg = "#eb6f92" },
    { mime = "application/x-rar", fg = "#eb6f92" },

    # Fallback
    { url = "*", fg = "#e0def4" },
    { url = "*/", fg = "#9ccfd8", bold = true },
]
